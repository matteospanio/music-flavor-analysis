name: Check Quarto notebook

on:
  push:
    paths:
      - "**.qmd"
      - "_quarto.yml"
      - "renv.lock"
      - "data/**"
      - ".github/workflows/check-quarto.yml"
  pull_request:
    paths:
      - "**.qmd"
      - "_quarto.yml"
      - "renv.lock"
      - "data/**"
      - ".github/workflows/check-quarto.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libv8-dev

      - uses: r-lib/actions/setup-renv@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto notebook
        run: quarto render music-flavor-analysis.qmd --to html
