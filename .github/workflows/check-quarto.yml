name: Check Quarto notebook

on:
  push:
    paths:
      - "**.qmd"
      - "_quarto.yml"
      - "renv.lock"
      - "data/**"
      - ".github/workflows/check-quarto.yml"
  pull_request:
    paths:
      - "**.qmd"
      - "_quarto.yml"
      - "renv.lock"
      - "data/**"
      - ".github/workflows/check-quarto.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - uses: r-lib/actions/setup-renv@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto notebook
        run: quarto render music-flavor-analysis.qmd --to html
